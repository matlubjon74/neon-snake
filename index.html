<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake Game</title>
    <style>
        body {
            background-color: #111424;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 2.5rem;
            text-shadow: 0 0 10px #00f3ff, 0 0 20px #00f3ff;
            letter-spacing: 2px;
        }

        .score-container {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 5px #ff007f;
        }

        #score {
            font-weight: bold;
            color: #ff007f;
        }

        canvas {
            border: 4px solid #00f3ff;
            background-color: #0c0f1d;
            box-shadow: 0 0 20px #00f3ff;
            border-radius: 8px;
        }

        .controls-info {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #8a9fc4;
            text-align: center;
        }

        #restart-btn {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: transparent;
            border: 2px solid #ff007f;
            color: #ff007f;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
            display: none;
        }

        #restart-btn:hover {
            background-color: #ff007f;
            color: #fff;
            box-shadow: 0 0 15px #ff007f;
        }
    </style>
</head>
<body>

    <h1>S N A K E</h1>
    <div class="score-container">Счёт: <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <button id="restart-btn" onclick="resetGame()">Играть снова</button>
    
    <div class="controls-info">
        Управление: <b>Стрелочки</b> или <b>WASD</b> на клавиатуре
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const restartBtn = document.getElementById("restart-btn");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = gridSize;
        let dy = 0;
        let score = 0;
        let gameInterval;
        let changingDirection = false;

        // Запуск игры
        resetGame();

        function resetGame() {
            snake = [
                { x: 160, y: 200 },
                { x: 140, y: 200 },
                { x: 120, y: 200 }
            ];
            dx = gridSize;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            restartBtn.style.display = "none";
            createFood();
            
            clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, 100);
        }

        function gameLoop() {
            if (hasGameEnded()) {
                clearInterval(gameInterval);
                restartBtn.style.display = "block";
                drawGameOver();
                return;
            }

            changingDirection = false;
            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();
        }

        function clearCanvas() {
            ctx.fillStyle = "#0c0f1d";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                // Голова змейки чуть ярче тела
                ctx.fillStyle = index === 0 ? "#00f3ff" : "#00a2ff";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#00f3ff";
                ctx.fillRect(part.x, part.y, gridSize - 2, gridSize - 2);
            });
            ctx.shadowBlur = 0; // Сброс тени
        }

        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            const hasEatenFood = snake[0].x === food.x && snake[0].y === food.y;
            if (hasEatenFood) {
                score += 10;
                scoreElement.textContent = score;
                createFood();
            } else {
                snake.pop();
            }
        }

        function createFood() {
            food.x = Math.floor(Math.random() * tileCount) * gridSize;
            food.y = Math.floor(Math.random() * tileCount) * gridSize;

            // Проверяем, чтобы еда не заспавнилась на змейке
            snake.forEach(part => {
                const hasEaten = part.x === food.x && part.y === food.y;
                if (hasEaten) createFood();
            });
        }

        function drawFood() {
            ctx.fillStyle = "#ff007f";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff007f";
            ctx.fillRect(food.x, food.y, gridSize - 2, gridSize - 2);
            ctx.shadowBlur = 0;
        }

        function hasGameEnded() {
            // Столкновение со стенами
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= canvas.width;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= canvas.height;

            if (hitLeftWall || hitRightWall || hitToptWall || hitBottomWall) return true;

            // Столкновение с хвостиком
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }

        function drawGameOver() {
            ctx.fillStyle = "rgba(12, 15, 29, 0.8)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = "bold 30px 'Segoe UI'";
            ctx.fillStyle = "#ff007f";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#ff007f";
            ctx.textAlign = "center";
            ctx.fillText("ИГРА ОКОНЧЕНА", canvas.width / 2, canvas.height / 2);
            ctx.shadowBlur = 0;
        }

        // Обработка нажатий клавиш
        document.addEventListener("keydown", changeDirection);

        function changeDirection(event) {
            const keyPressed = event.keyCode;
            
            // Коды клавиш (Стрелочки + WASD)
            const LEFT_KEY = 37; const A_KEY = 65;
            const UP_KEY = 38;    const W_KEY = 87;
            const RIGHT_KEY = 39; const D_KEY = 68;
            const DOWN_KEY = 40;  const S_KEY = 83;

            if (changingDirection) return;

            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            if ((keyPressed === LEFT_KEY || keyPressed === A_KEY) && !goingRight) {
                dx = -gridSize;
                dy = 0;
                changingDirection = true;
            }
            if ((keyPressed === UP_KEY || keyPressed === W_KEY) && !goingDown) {
                dx = 0;
                dy = -gridSize;
                changingDirection = true;
            }
            if ((keyPressed === RIGHT_KEY || keyPressed === D_KEY) && !goingLeft) {
                dx = gridSize;
                dy = 0;
                changingDirection = true;
            }
            if ((keyPressed === DOWN_KEY || keyPressed === S_KEY) && !goingUp) {
                dx = 0;
                dy = gridSize;
                changingDirection = true;
            }
        }
    </script>
</body>
</html>
